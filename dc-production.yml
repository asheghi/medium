services:
  blog:
    build: .
    image: ${BLOG_IMAGE:-medium-blog:local}
    restart: unless-stopped
    command: npm run start:docker
    ports:
      - "127.0.0.1:${HOST_PORT:-3000}:3000"
    env_file:
      - .env.production
    environment:
      HOST: "0.0.0.0"
      PORT: "3000"
      MINIO_END_POINT_URL: "minio"
      MINIO_PORT: "9000"
      MINIO_SSL: "false"
    depends_on:
      - db
      - minio
      - createbuckets

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env.production
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: ["server", "/data"]
    restart: unless-stopped
    env_file:
      - .env.production
    volumes:
      - minio_data:/data

  createbuckets:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    depends_on:
      - minio
    env_file:
      - .env.production
    entrypoint: >
      /bin/sh -c "
      sleep 10;
      /usr/bin/mc alias set star http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      /usr/bin/mc mb --ignore-existing star/$${MINIO_BUCKET_NAME};
      /usr/bin/mc anonymous set download star/$${MINIO_BUCKET_NAME};
      exit 0;
      "

volumes:
  postgres_data:
  minio_data:
